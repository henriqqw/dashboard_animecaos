          - heading "Por que o AnimeCaos existe?" [level=1] [ref=e34]
          - generic [ref=e35]:
            - paragraph [ref=e36]: "Quem assiste anime no Brasil sabe como é: quatro abas abertas, dez anúncios fechados, player que não carrega, episódio que some no meio da temporada."
            - paragraph [ref=e37]: O AnimeCaos surgiu disso. Automatiza a navegação, extrai os links diretamente dos players e junta tudo numa interface que não atrapalha. Sem servidor, sem conta, sem mensalidade.
            - paragraph [ref=e38]: É open source, feito em Python, e acaba sendo um bom campo de estudo pra quem quer entender automação web, scraping e busca aproximada na prática. Pull requests são bem-vindos.
